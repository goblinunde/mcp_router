name: Release RPM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:43

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.22.0 --activate

      - name: Install Linux packaging dependencies
        run: |
          dnf install -y \
            findutils \
            gcc-c++ \
            libarchive \
            make \
            python3 \
            rpm-build \
            desktop-file-utils

      - name: Show packaging toolchain
        run: |
          node --version
          pnpm --version
          rpm --version
          rpmbuild --version
          command -v bsdtar

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read application version
        shell: bash
        run: |
          APP_VERSION="$(node -p 'require("./apps/electron/package.json").version')"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected_tag="v${APP_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match ${expected_tag}"
            exit 1
          fi

      - name: Build Linux RPM package
        env:
          DEBUG: electron-installer-redhat*
        run: pnpm make:linux

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-router-rpm-${{ env.APP_VERSION }}
          path: apps/electron/out/make/rpm/**/*.rpm
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: MCP Router v${{ env.APP_VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: apps/electron/out/make/rpm/**/*.rpm

name: Release RPM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools fakeroot desktop-file-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read application version
        run: echo "APP_VERSION=$(node -p \"require('./apps/electron/package.json').version\")" >> "$GITHUB_ENV"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected_tag="v${APP_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match ${expected_tag}"
            exit 1
          fi

      - name: Build Linux RPM package
        run: pnpm make:linux

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-router-rpm-${{ env.APP_VERSION }}
          path: apps/electron/out/make/rpm/**/*.rpm
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: MCP Router v${{ env.APP_VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: apps/electron/out/make/rpm/**/*.rpm
